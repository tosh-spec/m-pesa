<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#3bb54a"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="M-PESA"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>M-PESA</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#000;font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;overflow:hidden}
body{display:flex;flex-direction:column;align-items:center}
#app{width:100%;max-width:430px;height:100vh;display:flex;flex-direction:column;background:#000;position:relative}
input{-webkit-appearance:none;appearance:none;border:none;outline:none}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
button{-webkit-tap-highlight-color:transparent;cursor:pointer;border:none;outline:none}
*{-webkit-user-select:none;user-select:none}
input,textarea{-webkit-user-select:text;user-select:text}

/* HEADER */
#header{background:#1c1c1e;padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid #3a3a3c}
.h-left{display:flex;align-items:center;gap:10px}
.avatar{width:38px;height:38px;border-radius:50%;background:#3a3a3c;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo{color:#fff;font-weight:800;font-size:17px;letter-spacing:.5px}
.h-right{display:flex;align-items:center;gap:6px}
.bal-badge{color:#3bb54a;font-weight:700;font-size:14px;background:rgba(59,181,74,.15);border-radius:20px;padding:4px 12px;border:1px solid rgba(59,181,74,.25)}
.icon-btn{background:none;border:1px solid #3a3a3c;border-radius:20px;padding:4px 10px;color:#fff;font-size:12px;font-weight:600}
.notif-btn{background:none;border:1.5px solid #3bb54a;border-radius:20px;padding:4px 10px;color:#3bb54a;font-size:12px;font-weight:600}

/* CONTENT */
#content{flex:1;overflow-y:auto;display:flex;flex-direction:column;-webkit-overflow-scrolling:touch}

/* NAV */
#nav{display:flex;background:#1c1c1e;border-top:1px solid #3a3a3c;flex-shrink:0}
.nav-btn{flex:1;background:none;display:flex;flex-direction:column;align-items:center;padding:8px 0 6px;gap:2px;border-top:2.5px solid transparent}
.nav-btn.active{border-top-color:#3bb54a}
.nav-icon{font-size:18px;line-height:1}
.nav-lbl{font-size:9px;font-weight:600;color:#8e8e93;letter-spacing:.2px}
.nav-btn.active .nav-lbl{color:#3bb54a}

/* SCREENS */
.screen{padding:18px 14px;display:flex;flex-direction:column;gap:13px}
.sec-title{color:#fff;font-weight:800;font-size:20px;margin-bottom:2px}

/* BALANCE CARD */
.bal-card{background:#1c1c1e;border-radius:16px;padding:26px 20px 20px;border:1px solid #3a3a3c;display:flex;flex-direction:column;align-items:center;gap:10px}
.bal-lbl{color:#8e8e93;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.bal-amt{color:#3bb54a;font-size:38px;font-weight:800;letter-spacing:-1px}
.bal-row{display:flex;gap:10px;margin-top:4px}
.bal-btn{background:#2c2c2e;color:#3bb54a;border:1.5px solid #3bb54a;border-radius:10px;padding:8px 18px;font-weight:700;font-size:14px}
.info-txt{color:#8e8e93;font-size:12px;text-align:center}
.inline-row{display:flex;gap:8px;width:100%;margin-top:4px}

/* FORM */
.f-group{display:flex;flex-direction:column;gap:5px}
.f-lbl{color:#8e8e93;font-size:12px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.f-inp{border:1.5px solid #3a3a3c;border-radius:10px;padding:12px 13px;font-size:15px;background:#2c2c2e;color:#fff;width:100%;font-family:inherit}
.f-inp:focus{border-color:#3bb54a}
.conf-btn{background:#3bb54a;color:#fff;border-radius:12px;padding:14px 0;font-weight:800;font-size:16px;width:100%;margin-top:4px;font-family:inherit}
.small-btn{background:#3bb54a;color:#fff;border-radius:10px;padding:12px 18px;font-weight:700;font-size:15px;white-space:nowrap;font-family:inherit}
.err-box{color:#ff453a;background:#3a1010;border-radius:8px;padding:9px 12px;font-size:13px;font-weight:600;border:1px solid #7a2020}

/* MESSAGES */
#msgs-wrap{padding:10px 12px 20px;display:flex;flex-direction:column;gap:10px;flex:1;background:#000}
.msg-ts{color:#8e8e93;font-size:12px;font-weight:400;text-align:left;padding:0 4px;margin-top:2px}
.msg-sender{display:none}
.msg-bubble{background:#1a1a1a;border-radius:18px;padding:14px 16px;width:100%;border:none}
.msg-txt{color:#fff;font-size:15px;line-height:1.55;white-space:pre-wrap;word-break:break-word;font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;font-weight:400}
.msg-txt a{color:#4dabff;text-decoration:underline}
.empty-msg{color:#8e8e93;text-align:center;margin-top:60px;font-size:14px;line-height:1.7;padding:0 30px}

/* TOAST */
#toast{position:fixed;top:-160px;left:50%;transform:translateX(-50%);width:calc(100% - 24px);max-width:420px;background:rgba(72,72,74,.95);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-radius:20px;padding:10px 12px;box-shadow:0 6px 28px rgba(0,0,0,.5);z-index:9999;transition:top .4s cubic-bezier(.4,1.2,.6,1);cursor:pointer}
#toast.show{top:14px}
.toast-inner{display:flex;align-items:center;gap:10px}
.toast-avatar{position:relative;flex-shrink:0}
.toast-circle{width:44px;height:44px;border-radius:50%;background:rgba(120,120,128,.55);display:flex;align-items:center;justify-content:center}
.toast-dot{position:absolute;bottom:1px;right:1px;width:13px;height:13px;border-radius:50%;background:#3bb54a;border:2px solid rgba(72,72,74,.95)}
.toast-body{flex:1;min-width:0}
.toast-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:1px}
.toast-title{color:#fff;font-weight:700;font-size:14px}
.toast-time{color:rgba(255,255,255,.5);font-size:12.5px}
.toast-msg{color:rgba(255,255,255,.88);font-size:13.5px;line-height:1.38;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;word-break:break-word}

/* LIGHT MODE */
body.light #app{background:#f0f0f0}
body.light #header{background:#3bb54a;border-bottom-color:#2da040}
body.light .logo{color:#fff}
body.light .bal-badge{color:#fff;background:rgba(0,0,0,.15);border-color:transparent}
body.light .icon-btn{border-color:rgba(255,255,255,.4);color:#fff}
body.light #content{background:#f0f0f0}
body.light #nav{background:#fff;border-top-color:#e8e8e8}
body.light .nav-lbl{color:#666}
body.light .nav-btn.active .nav-lbl{color:#3bb54a}
body.light .bal-card{background:#fff;border-color:#e0e0e0}
body.light .bal-lbl{color:#666}
body.light .bal-btn{background:#f0f0f0}
body.light .info-txt{color:#666}
body.light .f-inp{background:#fff;color:#111;border-color:#e0e0e0}
body.light .sec-title{color:#111}
body.light .f-lbl{color:#666}
body.light .msg-bubble{background:#1a1a1a;border:none}
body.light .msg-txt{color:#fff}
body.light .msg-sender{color:#666}
body.light .msg-ts{color:#8e8e93}
body.light .empty-msg{color:#666}
body.light #msgs-wrap{background:#000}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="h-left">
      <div class="avatar">🟢</div>
      <span class="logo">MPESA</span>
    </div>
    <div class="h-right">
      <span class="bal-badge" id="header-bal">Ksh5,000.00</span>
      <button class="notif-btn" id="notif-btn" onclick="askNotif()" style="display:none">🔔</button>
      <button class="icon-btn" id="theme-btn" onclick="toggleTheme()">☀️</button>
    </div>
  </div>

  <div id="content"></div>

  <div id="nav">
    <button class="nav-btn active" onclick="showTab('balance')" id="tab-balance">
      <span class="nav-icon">💰</span><span class="nav-lbl">Balance</span>
    </button>
    <button class="nav-btn" onclick="showTab('send')" id="tab-send">
      <span class="nav-icon">↗️</span><span class="nav-lbl">Send</span>
    </button>
    <button class="nav-btn" onclick="showTab('paybill')" id="tab-paybill">
      <span class="nav-icon">🏦</span><span class="nav-lbl">Pay Bill</span>
    </button>
    <button class="nav-btn" onclick="showTab('buygoods')" id="tab-buygoods">
      <span class="nav-icon">🛒</span><span class="nav-lbl">Buy Goods</span>
    </button>
    <button class="nav-btn" onclick="showTab('pochi')" id="tab-pochi">
      <span class="nav-icon">🤝</span><span class="nav-lbl">Pochi</span>
    </button>
    <button class="nav-btn" onclick="showTab('messages')" id="tab-messages">
      <span class="nav-icon">📩</span><span class="nav-lbl">Messages</span>
    </button>
  </div>
</div>

<div id="toast" onclick="dismissToast()">
  <div class="toast-inner">
    <div class="toast-avatar">
      <div class="toast-circle">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="rgba(255,255,255,0.75)">
          <circle cx="12" cy="8" r="4"/>
          <path d="M12 14c-5 0-8 2.5-8 4v1h16v-1c0-1.5-3-4-8-4z"/>
        </svg>
      </div>
      <div class="toast-dot"></div>
    </div>
    <div class="toast-body">
      <div class="toast-header">
        <span class="toast-title">MPESA</span>
        <span class="toast-time">now</span>
      </div>
      <div class="toast-msg" id="toast-msg"></div>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let balance = 5000;
let dailyUsed = 0;
let messages = [];
let currentTab = "balance";
let darkMode = true;
let toastTimer = null;

// ── Helpers ───────────────────────────────────────────────────────────────────
function pad2(n){ return String(n).padStart(2,"0"); }

function fmtKES(n){
  return "Ksh" + Number(n).toLocaleString("en-KE",{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtAmt(n){
  return Number(n).toLocaleString("en-KE",{minimumFractionDigits:2,maximumFractionDigits:2});
}
function getMpesaDate(){
  const now=new Date();
  const d=now.getDate(),m=now.getMonth()+1,y=String(now.getFullYear()).slice(2);
  let h=now.getHours();
  const min=pad2(now.getMinutes()),ampm=h>=12?"PM":"AM";
  h=h%12||12;
  return d+"/"+m+"/"+y+" at "+h+":"+min+" "+ampm;
}
function randomCode(prefix){
  const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let code=prefix.toUpperCase();
  while(code.length<10) code+=chars[Math.floor(Math.random()*chars.length)];
  return code;
}
function getTxCost(amount){
  const a=Number(amount);
  if(a<=100)  return 0;
  if(a<=500)  return 7;
  if(a<=1000) return 13;
  if(a<=1500) return 23;
  if(a<=2500) return 33;
  if(a<=3500) return 53;
  if(a<=5000) return 57;
  if(a<=7500) return 78;
  if(a<=10000)return 90;
  if(a<=15000)return 100;
  if(a<=20000)return 105;
  return 108;
}
const ONEAPP="Download My OneApp on https://saf.cx/IPKcC";
const DAILY_LIMIT=500000;
function remAmt(used){
  return Math.max(0,DAILY_LIMIT-used).toLocaleString("en-KE",{minimumFractionDigits:2,maximumFractionDigits:2});
}
function genSendMsg(o){
  return o.code+" Confirmed. Ksh"+fmtAmt(o.amount)+" sent to "+o.name+" "+o.phone+" on "+getMpesaDate()+". New M-PESA balance is "+fmtKES(o.balance)+". Transaction cost, "+fmtKES(o.cost)+". Amount you can transact within the day is "+remAmt(o.dailyUsed)+". "+ONEAPP;
}
function genPaybillMsg(o){
  return o.code+" Confirmed. Ksh"+fmtAmt(o.amount)+" sent to "+o.name+" Paybill Account for account "+o.account+" on "+getMpesaDate()+". New M-PESA balance is "+fmtKES(o.balance)+". Transaction cost, "+fmtKES(o.cost)+". Amount you can transact within the day is "+remAmt(o.dailyUsed)+". "+ONEAPP;
}
function genBuyGoodsMsg(o){
  return o.code+" Confirmed. Ksh"+fmtAmt(o.amount)+" paid to "+o.name+" on "+getMpesaDate()+". New M-PESA balance is "+fmtKES(o.balance)+". Transaction cost, "+fmtKES(o.cost)+". Amount you can transact within the day is "+remAmt(o.dailyUsed)+". "+ONEAPP;
}
function genPochiMsg(o){
  return o.code+" Confirmed. Ksh"+fmtAmt(o.amount)+" sent to "+o.name+" on "+getMpesaDate()+". New M-PESA balance is "+fmtKES(o.balance)+". Transaction cost, "+fmtKES(o.cost)+". Amount you can transact within the day is "+remAmt(o.dailyUsed)+". "+ONEAPP;
}
function timeLabel(ts){
  const diff=Date.now()-ts;
  if(diff<60000) return "Just now";
  if(diff<3600000) return Math.floor(diff/60000)+" min ago";
  const d=new Date(ts),mo=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return mo[d.getMonth()]+" "+d.getDate()+" "+pad2(d.getHours())+":"+pad2(d.getMinutes());
}
function linkify(text){
  return text.replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" rel="noreferrer" style="color:#0a84ff;text-decoration:none">$1</a>');
}
function esc(t){ return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function updateHeaderBal(){
  document.getElementById("header-bal").textContent=fmtKES(balance);
}

// ── Theme ─────────────────────────────────────────────────────────────────────
function toggleTheme(){
  darkMode=!darkMode;
  document.body.classList.toggle("light",!darkMode);
  document.getElementById("theme-btn").textContent=darkMode?"☀️":"🌙";
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(text){
  const el=document.getElementById("toast");
  document.getElementById("toast-msg").textContent=text.slice(0,120)+(text.length>120?"…":"");
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(dismissToast,10000);
}
function dismissToast(){
  document.getElementById("toast").classList.remove("show");
}

// ── Notifications ─────────────────────────────────────────────────────────────
function checkNotifBtn(){
  const btn=document.getElementById("notif-btn");
  if(typeof Notification!=="undefined"&&Notification.permission!=="granted"){
    btn.style.display="";
  } else { btn.style.display="none"; }
}
async function askNotif(){
  if(typeof Notification==="undefined") return;
  await Notification.requestPermission();
  checkNotifBtn();
}
function pushNotif(text){
  if(typeof Notification==="undefined"||Notification.permission!=="granted") return;
  const body=text.length>100?text.slice(0,100)+"…":text;
  if(navigator.serviceWorker&&navigator.serviceWorker.controller){
    navigator.serviceWorker.ready.then(function(reg){
      reg.showNotification("MPESA",{
        body:body,
        tag:"mpesa-msg",
        renotify:true,
        icon:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='96' fill='%23ffa500'/%3E%3C/svg%3E",
        badge:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 96 96'%3E%3Crect width='96' height='96' rx='48' fill='%23ffa500'/%3E%3C/svg%3E",
        data:{url:window.location.href+"#messages"}
      });
    });
  } else {
    new Notification("MPESA",{
      body:body,
      tag:"mpesa-msg",
      icon:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='96' fill='%23ffa500'/%3E%3C/svg%3E"
    });
  }
}
function handleMsg(text){
  messages.push({text,ts:Date.now()});
  showToast(text);
  if(window.AndroidBridge){
    AndroidBridge.sendNotification(text);
  } else {
    pushNotif(text);
  }
  showTab("messages");
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function showTab(tab){
  currentTab=tab;
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab-"+tab).classList.add("active");
  const c=document.getElementById("content");
  c.innerHTML="";
  const isMessages=(tab==="messages");
  document.getElementById("header").style.display=isMessages?"none":"";
  document.getElementById("nav").style.display=isMessages?"none":"";
  const screens={balance:renderBalance,send:renderSend,paybill:renderPaybill,buygoods:renderBuyGoods,pochi:renderPochi,messages:renderMessages};
  screens[tab](c);
}

// ── Balance Screen ────────────────────────────────────────────────────────────
function renderBalance(c){
  c.innerHTML=`
  <div class="screen">
    <div class="bal-card">
      <div class="bal-lbl">M-PESA Balance</div>
      <div class="bal-amt" id="bal-display">${fmtKES(balance)}</div>
      <div class="bal-row">
        <button class="bal-btn" onclick="balAction('set')">Set Balance</button>
        <button class="bal-btn" onclick="balAction('add')">Add Money</button>
      </div>
      <div class="inline-row" id="bal-input-row" style="display:none">
        <input class="f-inp" type="number" inputmode="decimal" id="bal-val" placeholder="Enter amount" style="flex:1"/>
        <button class="small-btn" id="bal-go-btn" onclick="balGo()">Set</button>
      </div>
    </div>
    <div class="info-txt">Balance deducts automatically with each transaction.</div>
  </div>`;
}
let balMode=null;
function balAction(mode){
  balMode=mode;
  const row=document.getElementById("bal-input-row");
  row.style.display="flex";
  document.getElementById("bal-go-btn").textContent=mode==="set"?"Set":"Add";
  document.getElementById("bal-val").placeholder=mode==="set"?"Enter new balance":"Amount to add";
  document.getElementById("bal-val").value="";
  document.getElementById("bal-val").focus();
}
function balGo(){
  const val=parseFloat(document.getElementById("bal-val").value);
  if(isNaN(val)||val<0) return;
  balance=balMode==="set"?val:balance+val;
  updateHeaderBal();
  document.getElementById("bal-display").textContent=fmtKES(balance);
  document.getElementById("bal-input-row").style.display="none";
}

// ── Form helper ───────────────────────────────────────────────────────────────
function field(label,id,placeholder,type){
  type=type||"text";
  return `<div class="f-group"><label class="f-lbl">${label}</label><input class="f-inp" type="${type}" inputmode="${type==="number"?"decimal":"text"}" id="${id}" placeholder="${placeholder}"/></div>`;
}
function prefixField(id){
  return field("Transaction Code Prefix (3 chars)",id,"e.g. UF6");
}
function getVal(id){ return document.getElementById(id).value.trim(); }
function setErr(id,msg){
  const el=document.getElementById(id);
  if(el){ el.textContent=msg; el.style.display=msg?"":"none"; }
}
function sanitizePrefix(id){
  const el=document.getElementById(id);
  if(!el) return;
  el.addEventListener("input",function(){
    this.value=this.value.replace(/[^A-Za-z0-9]/g,"").toUpperCase().slice(0,3);
  });
}

// ── Send Screen ───────────────────────────────────────────────────────────────
function renderSend(c){
  c.innerHTML=`<div class="screen">
    <div class="sec-title">Send Money</div>
    ${field("Recipient Name","s-name","e.g. John Gakui")}
    ${field("Phone Number","s-phone","e.g. 0743693878","tel")}
    ${field("Amount (Ksh)","s-amt","e.g. 500","number")}
    ${prefixField("s-pfx")}
    <div class="err-box" id="s-err" style="display:none"></div>
    <button class="conf-btn" onclick="confirmSend()">Confirm</button>
  </div>`;
  sanitizePrefix("s-pfx");
}
function confirmSend(){
  const name=getVal("s-name"),phone=getVal("s-phone"),amt=getVal("s-amt"),pfx=getVal("s-pfx");
  if(!name) return setErr("s-err","Enter recipient name.");
  if(!phone) return setErr("s-err","Enter phone number.");
  if(!amt||isNaN(amt)||Number(amt)<=0) return setErr("s-err","Enter a valid amount.");
  if(pfx.length!==3) return setErr("s-err","Prefix must be exactly 3 characters.");
  const cost=getTxCost(amt),total=Number(amt)+cost;
  if(total>balance) return setErr("s-err","Insufficient M-PESA balance.");
  setErr("s-err","");
  const newBal=balance-total; balance=newBal; dailyUsed+=total; updateHeaderBal();
  handleMsg(genSendMsg({code:randomCode(pfx),amount:amt,name,phone,balance:newBal,cost,dailyUsed}));
}

// ── Paybill Screen ────────────────────────────────────────────────────────────
function renderPaybill(c){
  c.innerHTML=`<div class="screen">
    <div class="sec-title">Pay Bill</div>
    ${field("Business / Merchant Name","p-name","e.g. Kenya Power")}
    ${field("Account Number","p-acc","e.g. 01234567")}
    ${field("Amount (Ksh)","p-amt","e.g. 2000","number")}
    ${prefixField("p-pfx")}
    <div class="err-box" id="p-err" style="display:none"></div>
    <button class="conf-btn" onclick="confirmPaybill()">Confirm</button>
  </div>`;
  sanitizePrefix("p-pfx");
}
function confirmPaybill(){
  const name=getVal("p-name"),acc=getVal("p-acc"),amt=getVal("p-amt"),pfx=getVal("p-pfx");
  if(!name) return setErr("p-err","Enter merchant name.");
  if(!acc) return setErr("p-err","Enter account number.");
  if(!amt||isNaN(amt)||Number(amt)<=0) return setErr("p-err","Enter a valid amount.");
  if(pfx.length!==3) return setErr("p-err","Prefix must be exactly 3 characters.");
  const cost=getTxCost(amt),total=Number(amt)+cost;
  if(total>balance) return setErr("p-err","Insufficient M-PESA balance.");
  setErr("p-err","");
  const newBal=balance-total; balance=newBal; dailyUsed+=total; updateHeaderBal();
  handleMsg(genPaybillMsg({code:randomCode(pfx),amount:amt,name,account:acc,balance:newBal,cost,dailyUsed}));
}

// ── Messages Screen ───────────────────────────────────────────────────────────
function renderMessages(c){
  c.style.background="#000";
  c.style.display="flex";
  c.style.flexDirection="column";
  c.style.height="100vh";

  // Top bar — just back arrow + MPESA like real SMS app
  const topBar=document.createElement("div");
  topBar.style.cssText="display:flex;align-items:center;gap:12px;padding:12px 14px 10px;background:#000;flex-shrink:0;border-bottom:1px solid #1a1a1a";
  topBar.innerHTML=`
    <button onclick="showTab('balance')" style="background:none;border:none;color:#fff;font-size:42px;cursor:pointer;padding:0;line-height:1;margin-top:-4px">&#8592;</button>
    <div style="width:40px;height:40px;border-radius:50%;background:#ffa500"></div>
    <span style="color:#fff;font-weight:700;font-size:17px;letter-spacing:.3px">MPESA</span>`;
  c.appendChild(topBar);

  // Scrollable messages area
  const scrollArea=document.createElement("div");
  scrollArea.style.cssText="flex:1;overflow-y:auto;padding:10px 12px 8px;display:flex;flex-direction:column;gap:10px;background:#000;-webkit-overflow-scrolling:touch";

  if(!messages.length){
    scrollArea.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;margin-top:60px">
      <div style="font-size:48px">📩</div>
      <div class="empty-msg">No messages yet. Complete a transaction to see your M-PESA confirmation here.</div>
    </div>`;
  } else {
    messages.forEach(function(m){
      const row=document.createElement("div");
      row.innerHTML=`
        <div class="msg-bubble"><p class="msg-txt">${linkify(esc(m.text))}</p></div>
        <div class="msg-ts">${timeLabel(m.ts)}</div>`;
      scrollArea.appendChild(row);
    });
  }
  c.appendChild(scrollArea);

  // Fixed footer — "Can't reply to this shortcode. Learn more."
  const footer=document.createElement("div");
  footer.style.cssText="background:#000;padding:12px 16px 20px;flex-shrink:0;text-align:center;border-top:1px solid #1a1a1a";
  footer.innerHTML=`<span style="color:#8e8e93;font-size:13px;font-family:-apple-system,'Helvetica Neue',Arial,sans-serif">Can't reply to this shortcode. <a href="#" style="color:#4dabff;text-decoration:none">Learn more</a></span>`;
  c.appendChild(footer);

  requestAnimationFrame(function(){
    scrollArea.scrollTop=scrollArea.scrollHeight;
  });
}
